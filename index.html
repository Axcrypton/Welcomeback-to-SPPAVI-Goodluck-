<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back to SPPAVI!</title>
    <link rel="stylesheet" href="style.css">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>Welcome Back to SPAAVI!🏫📚</h1>

        <p>
           Goodluck this school year as you embark on this school years
           new opportunities, new memories, new learnings, and so much more!
           wishing you all the best and successful year!
        </p>

        <button id="celebrateBtn">CELEBRATE!</button>
    </div>

    <script>
        document.getElementById("celebrateBtn").addEventListener("click", () => {
            confetti({
                particleCount: 150,
                spread: 120,
                origin: { y: 0.6 }
            });
        });
    </script>

</body>
</html>
